{% extends "base.html" %}
{% block title %}Manager Portal | Ember & Ivory{% endblock %}

{% block content %}
<div class="animate-in" style="max-width: 450px; margin: 10% auto;">

  <div style="text-align: center; margin-bottom: 40px;">
    <h2 style="font-size: 2.2rem; margin-bottom: 10px;">Manager Login</h2>
    <p style="text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; color: var(--text-muted);">
      Access the administrative dashboard
    </p>
  </div>

  <div class="glass-card">
    {% if error %}
    <div class="alert error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div style="margin-bottom: 30px;">
        <label for="username">Manager Username</label>
        <input type="text" name="username" id="username" class="form-input" placeholder="Manager ID" required>
      </div>

      <div style="margin-bottom: 40px;">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" class="form-input" placeholder="••••••••" required>
      </div>

      <div style="text-align: center;">
        <button type="submit" class="primary-btn" style="width: 100%;">
          Authenticate
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
