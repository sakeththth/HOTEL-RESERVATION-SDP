{% extends "base.html" %}
{% block title %}Membership Request | Ember & Ivory{% endblock %}

{% block content %}
<div class="animate-in" style="max-width: 500px; margin: 5% auto;">

  <div style="text-align: center; margin-bottom: 40px;">
    <h2 style="font-size: 2.2rem; margin-bottom: 10px;">Create an Account</h2>
    <p style="text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; color: var(--text-muted);">
      Sign up to manage your reservations
    </p>
  </div>

  <div class="glass-card">
    {% if error %}
    <div class="alert error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div style="margin-bottom: 25px;">
        <label for="name">Full Name</label>
        <input type="text" name="name" id="name" class="form-input" placeholder="e.g. Julian Vane" required>
      </div>

      <div style="margin-bottom: 25px;">
        <label for="email">Email Address</label>
        <input type="email" name="email" id="email" class="form-input" placeholder="e.g. guest@example.com" required>
      </div>

      <div style="margin-bottom: 25px;">
        <label for="phone">Phone Number</label>
        <input type="tel" name="phone" id="phone" class="form-input" placeholder="+91 XXXX XXX XXX" required>
      </div>

      <div style="margin-bottom: 25px;">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" class="form-input" placeholder="Create a secure key"
          required>
      </div>

      <div style="margin-bottom: 40px;">
        <label for="confirm">Confirm Password</label>
        <input type="password" name="confirm" id="confirm" class="form-input" placeholder="Verify your secure key"
          required>
      </div>

      <div style="text-align: center;">
        <button type="submit" class="primary-btn" style="width: 100%;">
          Sign Up
        </button>
      </div>
    </form>

    <div style="margin-top: 30px; text-align: center; border-top: 1px solid var(--border); padding-top: 25px;">
      <p style="font-size: 0.85rem; color: var(--text-muted);">
        Returning Guest?
        <a href="/login" style="color: var(--gold); text-decoration: none; font-weight: 500;">Access Portal</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
