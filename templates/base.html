<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ember & Ivory | Table Reservations{% endblock %}</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --gold: #b88a44;
            --gold-light: #b88a44;
            --bg: #0b1a3b;
            --surface: rgba(10, 30, 70, 0.6);
            --border: rgba(184, 138, 68, 0.2);
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.7);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        html {
            font-size: 19px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(180deg, #0b1a3b 0%, #0f2a5e 25%, #145a8a 55%, #1a7a9a 75%, #2098a8 100%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1,
        h2,
        h3,
        .serif {
            font-family: 'Playfair Display', serif;
            color: var(--gold-light);
            font-weight: 600;
        }

        /* NAVIGATION - MINIMAL & ELEGANT */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
            background: rgba(11, 26, 59, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .logo-wrap span {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* MAIN WRAPPER */
        .wrapper {
            padding-top: 120px;
            padding-bottom: 80px;
            min-height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 5%;
            padding-right: 5%;
        }

        /* CARDS - ELEVATED DESIGN */
        .glass-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 50px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, transparent 50%, rgba(212, 175, 55, 0.05) 50%);
        }

        /* BUTTONS */
        .primary-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 30px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.4s ease;
            border-radius: 0;
            position: relative;
            overflow: hidden;
        }

        .primary-btn:hover {
            background: var(--gold);
            color: #000;
        }

        /* FORMS */
        .form-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: #fff;
            padding: 15px 5px;
            width: 100%;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--gold);
        }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        /* ALERTS */
        .alert {
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .success {
            border: 1px solid #2d5a27;
            color: #a5d6a7;
            background: rgba(45, 90, 39, 0.1);
        }

        .error {
            border: 1px solid #7d2a2a;
            color: #ef9a9a;
            background: rgba(125, 42, 42, 0.1);
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        /* TABLES */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        th {
            text-align: left;
            padding: 20px;
            border-bottom: 1px solid var(--border);
            color: var(--gold);
            font-weight: 400;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        td {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        tr:hover td {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.02);
        }
    </style>
</head>

<body>

    <header class="header">
        <a href="/" class="logo-wrap">
            <img src="{{ url_for('static', filename='LOGO.png') }}" alt="Logo"
                style="height: 45px; border-radius: 4px;">
            <span class="logo-text">Ember & Ivory</span>
        </a>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/reserve">Reserve</a>
            <a href="/bookings">Bookings</a>
            <a href="/manager/login">Manager</a>
            <a href="/logout">Logout</a>
        </nav>
    </header>

    <main class="wrapper">
        {% block content %}{% endblock %}
    </main>

    <footer style="padding: 40px 5%; border-top: 1px solid var(--border); text-align: center; margin-top: 100px;">
        <p style="font-size: 0.75rem; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase;">
            © 2026 Ember & Ivory Luxury Dining. All Rights Reserved.
        </p>

    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
